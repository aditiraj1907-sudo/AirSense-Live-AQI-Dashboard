<!DOCTYPE html>
<html lang="en">
<head>

<body class="scene-green">

<!-- BACKGROUND SCENES -->
<div class="bg-green"></div>

  <defs>
    <radialGradient id="sunRay" cx="75%" cy="15%" r="60%">
      <stop offset="0%" stop-color="rgba(255,220,80,0.18)"/>
      <stop offset="100%" stop-color="rgba(255,220,80,0)"/>
    </radialGradient>
    <linearGradient id="groundGreen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(5,20,3,0)"/>
      <stop offset="100%" stop-color="rgba(5,20,3,0.85)"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="1200" height="800" fill="url(#sunRay)"/>
  <rect x="0" y="650" width="1200" height="150" fill="url(#groundGreen)"/>
</svg>

<div class="smog-layer"></div>
<div class="haze"></div>
<div class="transition-overlay" id="overlay"></div>

<!-- LOGO BAR -->
<div class="logo-bar">
  <div class="logo">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 2C8 2 5 5 5 9c0 5 7 13 7 13s7-8 7-13c0-4-3-7-7-7zm0 9.5a2.5 2.5 0 110-5 2.5 2.5 0 010 5z"/></svg>
    </div>
    AirSense
  </div>
  <span class="live-badge">● LIVE</span>
</div>

<!-- NAV DOTS -->
<div class="nav-dots">
  <div class="nav-dot active" onclick="goTo(0)" title="Welcome"></div>
  <div class="nav-dot" onclick="goTo(1)" title="Live AQI"></div>
  <div class="nav-dot" onclick="goTo(2)" title="Health Guide"></div>
</div>

<!-- PAGES -->
<div class="pages-wrap">

  <!-- PAGE 1: GREETING -->
  <div class="page active" id="page1">
    <div class="greeting-time" id="greetTime">
      <span id="clockDisplay">–</span> &nbsp;·&nbsp; <span id="dateDisplay">–</span>
    </div>
    <h1 class="big-greeting">
      <span id="greetWord">Good<br><em>Morning.</em></span>
    </h1>
    <p class="greeting-sub">
      The air around you is invisible — but its impact isn't.<br>
      Know what you're breathing before you step outside.
    </p>
    <div class="weather-strip">
      <div class="weather-pill">
        <div class="weather-pill-label">Location</div>
        <div class="weather-pill-val" id="geoCity" style="font-size:0.75rem;color:var(--muted)">Detecting…</div>
      </div>
      <div class="weather-pill">
        <div class="weather-pill-label">Local Time</div>
        <div class="weather-pill-val" id="localTime">–</div>
      </div>
      <div class="weather-pill">
        <div class="weather-pill-label">Date</div>
        <div class="weather-pill-val" id="localDate" style="font-size:0.78rem">–</div>
      </div>
    </div>
    <button class="cta-btn" onclick="goTo(1)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      Check Air Quality
    </button>
  </div>

  <!-- PAGE 2: LIVE AQI -->
  <div class="page" id="page2">
    <div class="search-section">
      <h2 class="search-title">Live <em>AQI</em></h2>
      <div class="search-wrap-pos">
        <div class="search-bar">
          <input type="text" id="searchInput" placeholder="Search any city — Delhi, Mumbai, Beijing…" autocomplete="off"/>
          <button class="search-btn" id="searchBtn" onclick="doSearch()">Check</button>
        </div>
        <div class="autocomplete-list" id="acList"></div>
      </div>
      <div class="quick-links">
        <button class="quick-btn" onclick="quickSearch('Noida, India')">Noida</button>
        <button class="quick-btn" onclick="quickSearch('Meerut, India')">Meerut</button>
        <button class="quick-btn" onclick="quickSearch('Delhi, India')">Delhi</button>
        <button class="quick-btn" onclick="quickSearch('Mumbai, India')">Mumbai</button>
        <button class="quick-btn" onclick="quickSearch('Kolkata, India')">Kolkata</button>
        <button class="quick-btn" onclick="quickSearch('Chennai, India')">Chennai</button>
      </div>
    </div>
    <div id="results"></div>
    <button class="to-health-btn" id="toHealthBtn" onclick="goTo(2)">
      🛡️ View Health Precautions →
    </button>
  </div>

  <!-- PAGE 3: HEALTH -->
  <div class="page" id="page3">
    <div class="health-header">
      <h2 class="health-title">Health <em>Guide</em></h2>
      <div class="health-city-tag" id="healthCityTag" style="display:none">
        📍 <span id="healthCityName">–</span> &nbsp;·&nbsp; AQI <span id="healthAqiTag">–</span>
      </div>
    </div>

    <div class="alert-banner" id="alertBanner" style="background:rgba(241,87,73,0.08);border-color:#f87171;color:#f87171;"></div>

    <div class="health-aqi-bar" id="healthAqiBar" style="display:none">
      <div class="health-aqi-num" id="healthBigNum">–</div>
      <div class="health-aqi-info">
        <div class="health-aqi-label" id="healthLabel">–</div>
        <div class="health-aqi-desc" id="healthDesc">–</div>
      </div>
    </div>

    <div class="precaution-grid" id="precautionGrid"></div>

    <button class="back-btn" onclick="goTo(1)">← Back to AQI</button>
  </div>

</div>


  <script src="app.js"></script>
</body>
</html>
